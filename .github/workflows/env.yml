# Generic CI configuration
#
name: env-test

on:
  push:
    branch:
      - master

jobs:
  build:
    name: env
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-18.04, windows-latest, macos-12]
    steps:
      - name: Display environment
        shell: bash
        run: |
          if [[ ${{ runner.os }} == 'Windows' ]]; then
            PGCONFIG="$PGBIN/pg_config"
          else
            PGCONFIG=pg_config
          fi
          ls -ld $(pg_config --bindir)
          ls -ld $(pg_config --includedir)
          ls -ld $(pg_config --libdir)
          set
