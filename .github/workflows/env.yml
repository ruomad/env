# Generic CI configuration
#
name: env-test

on:
  push:
    branch:
      - master

jobs:
  build:
    name: env
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-18.04, windows-latest, macos-12]
    steps:
      - name: Display environment
        shell: bash
        run: |
          if [[ ${{ runner.os }} == 'Windows' ]]; then
            PGCONFIG=$(cd "$PGBIN" && pwd)/pg_config.exe
          else
            PGCONFIG=pg_config
          fi
          echo $PGCONFIG
          echo "$($PGCONFIG --bindir)"
          echo "$($PGCONFIG --includedir)"
          echo "$($PGCONFIG --pkglibdir)"
          set
