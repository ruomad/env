# Generic CI configuration
#
name: env-test

on:
  push:
    branch:
      - master

jobs:
  build:
    name: env
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-18.04, windows-latest, macos-12]
    steps:
      - name: Display environment
        shell: bash
        run: |
          echo $PGROOT
          if [[ ${{ runner.os }} == 'Windows' ]]; then
            echo "$PGBIN"
            echo "$PGINCLUDE"
            echo "$PGLIB"
          else
            echo $(pg_config --bindir)
            echo $(pg_config --includedir)
            echo $(pg_config --libdir)
          fi
          ls -l "$D_PGBIN"
          set
