# Generic CI configuration
#
name: env-test

on:
  push:
    branch:
      - master

jobs:
  build:
    name: env
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-18.04, windows-latest, macos-12]
    steps:
      - name: Display environment
        shell: bash
        run: |
          pg_config --bindir
          set
