# Generic CI configuration
#
name: env-test

on:
  push:
    branch:
      - master

jobs:
  build:
    name: env
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-18.04, windows-latest, macos-12]
    steps:
      - name: Display environment
        shell: bash
        run: |
          echo $env.PGROOT
          if [[ ${{ runner.os }} == 'Windows' ]]; then
            set D_PGBIN=$PGBIN
          else
            D_PGBIN=$(pg_config --bindir)
          fi
          ls -l $D_PGBIN
          set
